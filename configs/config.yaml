data:
  raw_dir: data/raw/
  processed_dir: data/processed/
  train_values: data/raw/train_values.csv
  train_labels: data/raw/train_labels.csv
  test_values: data/raw/test_values.csv
  target_col: damage_grade
  id_col: building_id

split:
  test_size: 0.2
  random_state: 42

cv:
  n_splits: 5
  strategy: stratified_kfold

seed: 42

features:
  geo_cols:
    - geo_level_1_id
    - geo_level_2_id
    - geo_level_3_id
  cat_cols_low:
    - land_surface_condition
    - foundation_type
    - roof_type
    - ground_floor_type
    - other_floor_type
    - position
    - plan_configuration
    - legal_ownership_status
  superstructure_cols:
    - has_superstructure_adobe_mud
    - has_superstructure_mud_mortar_stone
    - has_superstructure_stone_flag
    - has_superstructure_cement_mortar_stone
    - has_superstructure_mud_mortar_brick
    - has_superstructure_cement_mortar_brick
    - has_superstructure_timber
    - has_superstructure_bamboo
    - has_superstructure_rc_non_engineered
    - has_superstructure_rc_engineered
    - has_superstructure_other
  secondary_use_cols:
    - has_secondary_use_agriculture
    - has_secondary_use_hotel
    - has_secondary_use_rental
    - has_secondary_use_institution
    - has_secondary_use_school
    - has_secondary_use_industry
    - has_secondary_use_health_post
    - has_secondary_use_gov_office
    - has_secondary_use_use_police
    - has_secondary_use_other
  encoding_method: glmm  # "glmm" or "manual_te"
  rare_threshold: 3      # geo categories with freq < this in train fold → "rare" sentinel
  target_encoding:
    smoothing: 10.0    # additive smoothing weight toward global mean (used only if encoding_method=manual_te)
  classes:
    - 1
    - 2
    - 3

models:
  lgb:
    # Starting hyperparameters — tuned by Optuna
    num_leaves: 127
    min_child_samples: 20
    colsample_bytree: 0.8
    subsample: 0.8
    subsample_freq: 1
    learning_rate: 0.05
    reg_alpha: 0.1
    reg_lambda: 0.1
    n_estimators: 3000
    early_stopping_rounds: 100
    verbose: -1
    n_jobs: -1
    random_state: 42

  xgb:
    # Starting hyperparameters — tuned by Optuna
    max_depth: 7
    min_child_weight: 5
    subsample: 0.8
    colsample_bytree: 0.8
    learning_rate: 0.05
    reg_alpha: 0.1
    reg_lambda: 1.0
    n_estimators: 3000
    early_stopping_rounds: 100
    tree_method: hist
    device: cuda
    verbosity: 0
    random_state: 42

  cat:
    # Starting hyperparameters — tuned by Optuna
    depth: 8
    l2_leaf_reg: 3.0
    learning_rate: 0.05
    bagging_temperature: 0.5
    random_strength: 1.0
    iterations: 1500
    early_stopping_rounds: 50
    # task_type: GPU  # DISABLED — GPU uses different cat encoding (Borders vs Ordered), drops from 0.7489 to 0.7404
    verbose: 0
    random_state: 42

  et:
    n_estimators: 1000
    max_depth: 25
    min_samples_split: 5
    min_samples_leaf: 2
    max_features: sqrt
    n_jobs: -1
    random_state: 42

optuna:
  n_trials: 100
  n_trials_et: 40          # ET has no early stopping — each trial is slower; fewer trials suffice
  direction: maximize     # maximize F1-micro
  timeout: null           # no wall-clock limit
  show_progress_bar: true
  n_estimators_ceiling: 3000   # tree-count ceiling for early stopping in trial objectives
  early_stopping_rounds: 50    # tighter patience for HPO trials (vs 100 in post-HPO training)
  best_iter_fallback: 500      # fallback best_iter if trial user_attr is missing (should never occur)

ensemble:
  # Initial weight guess: [lgb, cat, xgb] — must sum to 1
  initial_weights:
    - 0.3
    - 0.3
    - 0.2
    - 0.2
  models_order:
    - lgb
    - cat
    - xgb
    - et

output:
  models_dir: models/
  submissions_dir: submissions/
