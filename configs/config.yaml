data:
  raw_dir: data/raw/
  processed_dir: data/processed/
  train_values: data/raw/train_values.csv
  train_labels: data/raw/train_labels.csv
  test_values: data/raw/test_values.csv
  target_col: damage_grade
  id_col: building_id

split:
  test_size: 0.2
  random_state: 42

seed: 42

features:
  geo_cols:
    - geo_level_1_id
    - geo_level_2_id
    - geo_level_3_id
  cat_cols_low:
    - land_surface_condition
    - foundation_type
    - roof_type
    - ground_floor_type
    - other_floor_type
    - position
    - plan_configuration
    - legal_ownership_status
  superstructure_cols:
    - has_superstructure_adobe_mud
    - has_superstructure_mud_mortar_stone
    - has_superstructure_stone_flag
    - has_superstructure_cement_mortar_stone
    - has_superstructure_mud_mortar_brick
    - has_superstructure_cement_mortar_brick
    - has_superstructure_timber
    - has_superstructure_bamboo
    - has_superstructure_rc_non_engineered
    - has_superstructure_rc_engineered
    - has_superstructure_other
  secondary_use_cols:
    - has_secondary_use_agriculture
    - has_secondary_use_hotel
    - has_secondary_use_rental
    - has_secondary_use_institution
    - has_secondary_use_school
    - has_secondary_use_industry
    - has_secondary_use_health_post
    - has_secondary_use_gov_office
    - has_secondary_use_use_police
    - has_secondary_use_other
  target_encoding:
    smoothing: 10.0    # additive smoothing weight toward global mean
  classes:
    - 1
    - 2
    - 3

models:
  lgb:
    # Starting hyperparameters — tuned by Optuna
    num_leaves: 127
    min_child_samples: 20
    colsample_bytree: 0.8
    subsample: 0.8
    subsample_freq: 1
    learning_rate: 0.05
    reg_alpha: 0.1
    reg_lambda: 0.1
    n_estimators: 3000
    early_stopping_rounds: 100
    verbose: -1
    n_jobs: -1
    random_state: 42

  xgb:
    # Starting hyperparameters — tuned by Optuna
    max_depth: 7
    min_child_weight: 5
    subsample: 0.8
    colsample_bytree: 0.8
    learning_rate: 0.05
    reg_alpha: 0.1
    reg_lambda: 1.0
    n_estimators: 3000
    early_stopping_rounds: 100
    tree_method: hist
    verbosity: 0
    random_state: 42

  cat:
    # Starting hyperparameters — tuned by Optuna
    depth: 8
    l2_leaf_reg: 3.0
    learning_rate: 0.05
    bagging_temperature: 0.5
    random_strength: 1.0
    iterations: 3000
    early_stopping_rounds: 100
    verbose: 0
    random_state: 42

optuna:
  n_trials: 100
  direction: maximize     # maximize F1-micro
  timeout: null           # no wall-clock limit
  show_progress_bar: true

ensemble:
  # Initial weight guess: [lgb, cat, xgb] — must sum to 1
  initial_weights:
    - 0.4
    - 0.35
    - 0.25
  models_order:
    - lgb
    - cat
    - xgb

output:
  models_dir: models/
  submissions_dir: submissions/
